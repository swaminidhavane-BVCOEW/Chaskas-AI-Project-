<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chaukas Pay — Success</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .success-ring {
      width: 100px; height: 100px; border-radius: 50%;
      background: linear-gradient(135deg,#00C896,#00E5B0);
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; margin: 32px auto 20px;
      box-shadow: 0 12px 40px rgba(0,200,150,0.35);
      animation: pop 0.5s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes pop {
      0%   { transform: scale(0); opacity:0; }
      70%  { transform: scale(1.12); }
      100% { transform: scale(1); opacity:1; }
    }
  </style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span>9:41</span>
    <span>SBI ●●●●● 5G</span>
  </div>

  <div class="content" style="display:flex;flex-direction:column;align-items:center;padding-top:24px;">
    <div class="success-ring">✓</div>
    <h2 style="font-size:22px;font-weight:800;margin-bottom:6px;">Payment Sent!</h2>
    <p style="color:var(--text-3);font-size:14px;margin-bottom:32px;">Transaction completed successfully</p>

    <div style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;">
      <div class="confirm-row" style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;">
        <span style="color:var(--text-2);font-size:13px;">Amount</span>
        <span style="font-weight:700;" id="s-amount">—</span>
      </div>
      <div class="confirm-row" style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;">
        <span style="color:var(--text-2);font-size:13px;">Paid to</span>
        <span style="font-weight:600;" id="s-receiver">—</span>
      </div>
      <div class="confirm-row" style="padding:8px 0;display:flex;justify-content:space-between;">
        <span style="color:var(--text-2);font-size:13px;">Transaction ID</span>
        <span style="font-weight:600;font-family:'JetBrains Mono',monospace;font-size:11px;" id="s-txnid">—</span>
      </div>
    </div>

    <div class="alert-badge success" style="width:100%;">
      <span>🛡️</span>
      <span>Verified safe by Chaukas AI</span>
    </div>

    <button class="btn btn-primary" onclick="window.location.href='dashboard.html'" style="margin-top:20px;width:100%;">
      Back to Home
    </button>
  </div>
</div>
<script>
  const txn = JSON.parse(sessionStorage.getItem('txn')||'{}');
  document.getElementById('s-amount').textContent   = '₹'+Number(txn.amount||0).toLocaleString('en-IN');
  document.getElementById('s-receiver').textContent = txn.receiver||'—';
  document.getElementById('s-txnid').textContent    = 'CK'+Date.now().toString().slice(-8);
</script>
</body>
</html>
